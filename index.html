<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pre Moju Lásku ❤️</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --primary-light: #ff758f;
            --primary-glow: rgba(255, 77, 109, 0.45);
            --accent: #06b6d4;
            --accent-light: #38bdf8;
            --bg: #07040f;
            --card-bg: rgba(22, 12, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --btn-gradient: linear-gradient(135deg, #ff4d6d 0%, #ff758f 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Helvetica, Arial, sans-serif;
            background: var(--bg);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; perspective: 1200px;
        }

        /* STABILNÉ CANVAS POZADIE PRE LIETAJÚCE FOTKY */
        #canvas-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .blur-orbs {
            position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(255, 77, 109, 0.18), transparent 45%),
                        radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.15), transparent 45%);
            filter: blur(50px);
        }

        .phone-container {
            width: 100%; max-width: 395px; height: 100vh; max-height: 852px;
            background: rgba(11, 6, 22, 0.75);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 80px rgba(255, 77, 109, 0.08);
            overflow-y: auto; display: flex; flex-direction: column;
            position: relative; box-sizing: border-box; z-index: 5;
            border: 1px solid var(--border); border-radius: 44px;
        }
        .phone-container::-webkit-scrollbar { display: none; }

        @media (max-width: 420px) {
            .phone-container { border-radius: 0; max-height: 100vh; border: none; }
        }

        .btn-style {
            background: var(--btn-gradient);
            color: white; border: none;
            padding: 16px 28px; border-radius: 22px;
            font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
            cursor: pointer; position: relative; overflow: hidden;
            box-shadow: 0 8px 20px var(--primary-glow), inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            box-sizing: border-box; width: 100%;
        }
        .btn-style:hover { transform: translateY(-2px); box-shadow: 0 12px 25px var(--primary-glow); }
        .btn-style:active { transform: translateY(1px) scale(0.98); filter: brightness(0.9); }

        .premium-player {
            position: absolute; top: 28px; right: 25px; z-index: 50;
            display: none; align-items: center;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 8px 14px; border-radius: 30px; cursor: pointer;
        }
        .music-bars { display: flex; align-items: flex-end; gap: 3px; height: 13px; margin-right: 8px; }
        .bar {
            width: 2px; height: 100%; background: var(--primary-light); border-radius: 1px;
            animation: bounceBars 0.5s ease-in-out infinite alternate; animation-play-state: paused;
        }
        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounceBars { 0% { height: 20%; } 100% { height: 100%; } }

        #login-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100%; padding: 30px; box-sizing: border-box;
        }
        .glass-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 45px 30px; border-radius: 38px; width: 100%; box-sizing: border-box;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .input-style {
            width: 100%; padding: 18px 20px; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; font-size: 16px; text-align: center; outline: none;
            background: rgba(0, 0, 0, 0.4); color: white; margin-bottom: 20px; box-sizing: border-box;
        }

        #main-screen { display: none; padding: 25px; box-sizing: border-box; }
        
        .countdown-container {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; padding: 24px 15px; text-align: center; margin-bottom: 25px; margin-top: 55px;
        }
        .countdown-timer {
            font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, #ffffff 30%, var(--primary-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 8px;
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding-bottom: 20px; }
        
        .tile {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06);
            aspect-ratio: 1; border-radius: 26px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 19px; font-weight: 800;
            color: var(--primary-light); position: relative; cursor: pointer;
            box-sizing: border-box; transition: background 0.3s, border-color 0.3s, transform 0.2s;
        }
        .tile::before { content: "🎀"; font-size: 19px; margin-bottom: 4px; }
        
        /* MINI VIBRÁCIA DO RYTMU (MAX 1px) */
        .tile.music-wave-active:not(.opened) {
            animation: tileSideWave 1.4s infinite ease-in-out alternate;
        }

        @keyframes tileSideWave {
            0% { transform: translateX(-1px); border-color: rgba(255, 77, 109, 0.3); }
            100% { transform: translateX(1px); border-color: var(--primary-light); box-shadow: 0 0 5px rgba(255, 77, 109, 0.08); }
        }

        .tile.wiggle:not(.music-wave-active):not(.opened) {
            animation: pulseTileIdle 2s infinite alternate ease-in-out;
        }
        @keyframes pulseTileIdle {
            0% { border-color: rgba(255, 77, 109, 0.15); }
            100% { border-color: rgba(255, 77, 109, 0.35); }
        }

        .tile.opened { 
            background: rgba(255, 77, 109, 0.18); 
            color: #fff; 
            border-color: rgba(255, 77, 109, 0.4);
            transform: none !important;
            animation: none !important;
            box-shadow: none;
        }
        .tile.opened::before { content: "💖"; }
        
        .tile.locked { background: rgba(255, 255, 255, 0.01); color: rgba(255, 255, 255, 0.15); border: 1px dashed rgba(255, 255, 255, 0.06); cursor: not-allowed; }
        .tile.locked::before { content: "🔒"; opacity: 0.2; }

        .love-bar {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px; padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px; cursor: pointer; transition: all 0.3s;
        }
        .love-bar:hover { background: rgba(255, 77, 109, 0.1); border-color: var(--primary-light); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 2, 8, 0.88); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); justify-content: center; align-items: center; z-index: 999; padding: 20px;
        }
        .modal-content {
            background: linear-gradient(180deg, #160d26 0%, #0a0514 100%);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 38px;
            width: 100%; max-width: 340px; padding: 25px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .modal-image { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 26px; margin-bottom: 18px; }
        .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        .modal-text { font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.75); margin-bottom: 22px; }

        .fullscreen-flight-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #09071c 0%, #020205 100%); z-index: 1000;
            flex-direction: column; justify-content: space-between; align-items: center;
            padding: 70px 25px 50px 25px; box-sizing: border-box;
        }
        .animated-airplane {
            font-size: 50px; position: absolute; left: -90px; top: 45%; z-index: 10;
            filter: drop-shadow(0 0 15px var(--accent-light)); animation: flyAcross 6s linear infinite;
        }
        @keyframes flyAcross {
            0% { left: -90px; top: 55%; transform: rotate(12deg); }
            50% { top: 40%; transform: rotate(0deg); }
            100% { left: 110%; top: 35%; transform: rotate(4deg); }
        }

        .flying-heart {
            position: absolute; pointer-events: none; z-index: 99;
            animation: heartFlyUp 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes heartFlyUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-400px) scale(0) rotate(360deg); opacity: 0; }
        }

        .time-machine-panel { background: rgba(6, 182, 212, 0.05); border: 1px solid rgba(6, 182, 212, 0.2); border-radius: 24px; padding: 15px; margin-top: 55px; margin-bottom: 15px; font-size: 13px; }
        .control-group { margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .time-slider { width: 60%; accent-color: var(--accent-light); }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="blur-orbs"></div>

    <audio id="bg-music" src="media/hudba.mp3" loop></audio>

    <div class="phone-container" id="app-shell">
        
        <div class="premium-player" id="premium-music-bar" onclick="toggleMusic()">
            <div class="music-bars" id="m-bars">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <span style="font-size: 11px; font-weight: 800; letter-spacing: 0.5px;">HUDBA HRÁ</span>
        </div>

        <div id="login-screen">
            <div class="glass-card">
                <div style="font-size: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary))">❤️</div>
                <h1>Naše miesto</h1>
                <p style="color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 25px;">Zadaj heslo a vstúp do odpočítavania</p>
                <input type="password" id="password-field" class="input-style" placeholder="Zadaj tajné heslo">
                <button onclick="checkPassword()" class="btn-style">Odomknúť aplikáciu ✨</button>
            </div>
        </div>

        <div id="main-screen">
            <div id="admin-time-machine" class="time-machine-panel" style="display: none;">
                <div style="font-weight:800; color:var(--accent-light); margin-bottom:8px;">🛠️ ADMIN OVLÁDANIE ČASU</div>
                <div class="control-group">
                    <label>Deň (Júl):</label>
                    <input type="range" id="sim-day" class="time-slider" min="1" max="17" value="1" oninput="onTimeEngineUpdate()">
                    <span id="sim-day-val" style="color:var(--accent-light);">1.7.</span>
                </div>
                <div class="control-group">
                    <label>Hodina:</label>
                    <input type="range" id="sim-hour" class="time-slider" min="0" max="23" value="16" oninput="onTimeEngineUpdate()">
                    <span id="sim-hour-val" style="color:var(--accent-light);">16:00</span>
                </div>
            </div>

            <div class="countdown-container">
                <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.4)">Stretneme sa o:</div>
                <div id="countdown-display" class="countdown-timer">00d : 00h : 00m : 00s</div>
            </div>

            <div class="calendar-grid" id="tiles-grid"></div>

            <div class="love-bar" onclick="burstHearts(event)">
                <span style="font-size: 14px; font-weight: 700;">Poslať lásku... 💕</span>
                <span style="font-size: 12px; color: var(--primary-light); background: rgba(255,77,109,0.15); padding: 4px 10px; border-radius: 12px;">Ťukni sem</span>
            </div>

            <button id="final-flight-btn" onclick="openFlightModal()"></button>
        </div>
    </div>

    <div id="gift-modal" class="modal">
        <div class="modal-content">
            <div id="gift-title" class="modal-title" style="color: var(--primary-light);">Deň X</div>
            <img id="gift-image" class="modal-image" src="" alt="Spomienka">
            <div id="gift-text" class="modal-text">...</div>
            <button onclick="closeModal()" class="btn-style">Zatvoriť spomienku 💖</button>
        </div>
    </div>

    <div id="flight-modal" class="fullscreen-flight-modal">
        <div class="animated-airplane">✈️</div>
        <div style="z-index: 20; text-align: center;">
            <div style="font-size: 13px; letter-spacing: 4px; color: var(--accent-light); font-weight:900;">LIVE RADAR</div>
            <h2 style="font-size: 28px; font-weight:900; margin: 10px 0;">UŽ LETÍM ZA TEBOU!</h2>
        </div>
        <div style="z-index: 20; text-align:center;">
            <div style="font-size:11px; color:rgba(255,255,255,0.4);">ČAS DO PRISTÁTIA</div>
            <div id="fullscreen-timer-display" style="font-size: 38px; font-weight: 900; color: var(--accent-light);">00d : 00h : 00m : 00s</div>
        </div>
        <button onclick="closeFlightModal()" class="btn-style" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); width:75%; z-index:20;">Zavrieť radar 🗺️</button>
    </div>

    <script>
        const MY_PASSWORD = "milujemju"; const HER_PASSWORD = "milujemta"; const ADMIN_PASSWORD = "admin201024";
        let isAdminMode = false; let currentUserPrefix = "shared"; let isMusicPlaying = false;
        const TARGET_LANDING_DATE = new Date('2026-07-17T08:00:00');

        const dailyMessages = {
            1: "Prvý deň nášho odpočítavania! Každým dňom som bližšie k tebe... 🤍", 2: "Dnes myslím na tvoj úsmev. Už sa neviem dočkať, kedy ťa objímem.",
            3: "Malé prekvapenie na dnešný deň! Chcem ti len bleskovo povedať, že ťa ľúbim.", 4: "Pamätáš si na tento moment? Bola si taká nádherná...",
            5: "Ďalší deň úspešne za nami. Čas letí, keď sa teším na teba!", 6: "Dnes ti posielam virtuálnu pusu. Už len kúsok!",
            7: "Sme skoro v prvej tretine! Si to najlepšie, čo ma v živote stretlo.", 8: "Dnes si pozri túto fotku a usmej sa, prosím. Chýbaš mi.",
            9: "Milujem naše spoločné chvíle a táto spomienka patrí medzi moje naj.", 10: "Už jednociferné číslo! Odpočítavam každú jednu sekundu.",
            11: "Dnes je krásny deň na to, aby som ti pripomenul, aká si neskutočne úžasná.", 12: "Moje srdce bije len pre teba, nech sme akokoľvek ďaleko od seba.",
            13: "Už len párkrát sa bez seba vyspíme a budeme zaspávať spolu.", 14: "Čas sa kráti! Už čoskoro budem baliť kufre.",
            15: "Zostávajú posledné dni. Neviem sa dočkať chvíle, kedy ťa opäť chytím za ruku.", 16: "Zajtra je ten deň... Dnes nebudem môcť spať!",
            17: "KONEČNE JE TO TU! Dnes letím za tebou. Pozri si odpočet nižšie! ❤️"
        };

        // KÓD PRE LIETAJÚCE MINI FOTKY NA POZADÍ
        const canvas = document.getElementById('canvas-bg'); const ctx = canvas.getContext('2d');
        let particles = [];
        const loadedImages = [];
        const totalImages = 17;
        let imagesLoadedCount = 0;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        // Prednačítanie fotiek z media priečinka
        for (let i = 1; i <= totalImages; i++) {
            const img = new Image();
            img.src = `media/${i}.jpg`;
            img.onload = () => {
                loadedImages.push(img);
                imagesLoadedCount++;
                // Keď sa načítajú prvé obrázky, inicializujeme lietanie
                if (imagesLoadedCount === 1) {
                    initParticles();
                }
            };
            img.onerror = () => {
                // Ak fotka chýba, ignorujeme ju, nech aplikácia nezlyhá
                imagesLoadedCount++;
            };
        }

        class PhotoParticle {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() { 
                this.x = Math.random() * canvas.width; 
                this.y = canvas.height + Math.random() * 50; 
                this.size = Math.random() * 25 + 20; // Nastavenie miniatúrnej veľkosti (20px až 45px)
                this.speed = Math.random() * 0.3 + 0.1; // Hladký pomalý let
                this.opacity = Math.random() * 0.2 + 0.1; // Polopriehľadné (10% až 30%), aby nerušili text
                this.img = null;
                if (loadedImages.length > 0) {
                    this.img = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                }
            }
            update() { 
                this.y -= this.speed; 
                if (this.y < -this.size) this.reset(); 
            }
            draw() { 
                if (!this.img && loadedImages.length > 0) {
                    this.img = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                }
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                if (this.img) {
                    // Nakreslíme zaoblenú miniatúrnu fotku na pozadie
                    ctx.beginPath();
                    ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip();
                    ctx.drawImage(this.img, this.x, this.y, this.size, this.size);
                } else {
                    // Záložné srdiečko, ak by sa fotky ešte nenačítali
                    ctx.fillStyle = 'rgba(255, 117, 143, 0.2)';
                    ctx.font = `${this.size}px Arial`;
                    ctx.fillText('❤️', this.x, this.y);
                }
                ctx.restore();
            }
        }

        function initParticles() {
            if (particles.length === 0) {
                for(let i=0; i<18; i++) particles.push(new PhotoParticle());
            }
        }

        // Ak by sa náhodou fotky dlho načítavali, spustíme aspoň srdiečka, ktoré sa neskôr zmenia na fotky
        setTimeout(initParticles, 500);

        function anim() { 
            ctx.clearRect(0,0,canvas.width,canvas.height); 
            particles.forEach(p=>{p.update();p.draw();}); 
            requestAnimationFrame(anim); 
        }
        anim();

        function burstHearts(e) {
            const shell = document.querySelector('.phone-container');
            for(let i=0; i<15; i++) {
                const h = document.createElement('div'); h.className = 'flying-heart';
                h.innerText = ['❤️','💖','💕','🌸'][Math.floor(Math.random()*4)];
                h.style.left = (e.clientX ? e.clientX - shell.getBoundingClientRect().left : 150) + (Math.random()*60 - 30) + 'px';
                h.style.top = '80%'; h.style.fontSize = Math.random()*12 + 15 + 'px';
                shell.appendChild(h); setTimeout(() => h.remove(), 2000);
            }
        }

        function checkPassword() {
            const val = document.getElementById("password-field").value;
            if (val === ADMIN_PASSWORD) {
                isAdminMode = true; currentUserPrefix = "admin";
                document.getElementById("admin-time-machine").style.display = "block";
                executeLogin();
            } else if (val === MY_PASSWORD || val === HER_PASSWORD) {
                isAdminMode = false; currentUserPrefix = (val === MY_PASSWORD) ? "my" : "her";
                executeLogin();
            } else { alert("Nesprávne heslo! 😘"); }
        }

        function executeLogin() {
            const music = document.getElementById("bg-music");
            music.play().then(() => { isMusicPlaying = true; toggleAnimationBars(true); }).catch(()=>{});
            
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            document.getElementById("premium-music-bar").style.display = "flex";
            
            updateCountdown(); setInterval(updateCountdown, 1000);
            generateBoxes(); manageFlightButton();
        }

        function toggleMusic() {
            const audio = document.getElementById("bg-music");
            if (isMusicPlaying) { audio.pause(); toggleAnimationBars(false); }
            else { audio.play(); toggleAnimationBars(true); }
            isMusicPlaying = !isMusicPlaying;
        }

        function toggleAnimationBars(run) {
            document.querySelectorAll(".bar").forEach(b => b.style.animationPlayState = run ? "running" : "paused");
            
            const tiles = document.querySelectorAll(".tile");
            tiles.forEach((tile, index) => {
                if (run && tile.classList.contains('wiggle') && !tile.classList.contains('opened')) {
                    tile.classList.add("music-wave-active");
                    tile.style.animationDelay = (index * 0.1) + "s";
                } else {
                    tile.classList.remove("music-wave-active");
                    tile.style.animationDelay = "0s";
                }
            });
        }

        function getCurrentTime() {
            if (isAdminMode) {
                const d = parseInt(document.getElementById("sim-day").value);
                const h = parseInt(document.getElementById("sim-hour").value);
                const date = new Date(); date.setFullYear(2026); date.setMonth(6); date.setDate(d); date.setHours(h, 0, 0, 0);
                return date;
            }
            return new Date();
        }

        function onTimeEngineUpdate() {
            document.getElementById("sim-day-val").innerText = document.getElementById("sim-day").value + ".7.";
            document.getElementById("sim-hour-val").innerText = document.getElementById("sim-hour").value.padStart(2,'0') + ":00";
            updateCountdown(); generateBoxes(); manageFlightButton();
        }

        function updateCountdown() {
            const diff = TARGET_LANDING_DATE - getCurrentTime();
            const disp = document.getElementById("countdown-display");
            const fsDisp = document.getElementById("fullscreen-timer-display");
            if (diff <= 0) { disp.innerText = "SME SPOLU! ❤️"; if(fsDisp) fsDisp.innerText = "PRISTÁL SOM! 😍"; return; }
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
            const seconds = Math.floor((diff % (1000*60)) / 1000);
            const str = `${days}d : ${String(hours).padStart(2,'0')}h : ${String(minutes).padStart(2,'0')}m : ${String(seconds).padStart(2,'0')}s`;
            disp.innerText = str; if(fsDisp) fsDisp.innerText = str;
        }

        function generateBoxes() {
            const grid = document.getElementById("tiles-grid"); grid.innerHTML = "";
            const now = getCurrentTime(); const cDay = now.getDate(); const cMonth = now.getMonth() + 1; const cHour = now.getHours();

            for (let i = 1; i <= 17; i++) {
                const tile = document.createElement("div"); tile.className = "tile"; tile.innerText = i;
                let isUnlocked = (cMonth === 7 && (i < cDay || (i === cDay && cHour >= 3)));
                let opened = localStorage.getItem(`${currentUserPrefix}_box_opened_${i}`);

                if (isUnlocked) {
                    if (opened) tile.classList.add("opened"); else tile.classList.add("wiggle");
                    tile.onclick = () => openGift(i, tile);
                } else { tile.classList.add("locked"); tile.onclick = () => alert("Okienko spinká do 3:00 ráno. 🌙"); }
                grid.appendChild(tile);
            }
            if (isMusicPlaying) toggleAnimationBars(true);
        }

        function openGift(day, el) {
            if (!isAdminMode) localStorage.setItem(`${currentUserPrefix}_box_opened_${day}`, "true");
            
            el.classList.remove("wiggle", "music-wave-active"); 
            el.classList.add("opened");
            el.style.animation = "none";
            el.style.transform = "none";

            document.getElementById("gift-title").innerText = `Deň ${day} ❤️`;
            document.getElementById("gift-image").src = `media/${day}.jpg`;
            document.getElementById("gift-text").innerText = dailyMessages[day];
            document.getElementById("gift-modal").style.display = "flex";
        }

        function manageFlightButton() {
            const btn = document.getElementById("final-flight-btn"); const now = getCurrentTime();
            const is17 = (now.getMonth()+1 === 7 && now.getDate() === 17 && now.getHours() >= 3);
            if (is17) {
                if (now.getHours() >= 6) {
                    btn.className = "btn-style"; btn.style.background = "linear-gradient(135deg, #4f46e5, #06b6d4)";
                    btn.innerHTML = "✈️ RADAR: LETÍM K TEBE!"; btn.disabled = false;
                } else { btn.className = "btn-style"; btn.style.background = "#232429"; btn.innerHTML = "🔒 Čaká sa na štart (06:00)"; btn.disabled = true; }
            } else { btn.className = "btn-style"; btn.style.background = "rgba(255,255,255,0.05)"; btn.innerHTML = "🎁 SKRYTÉ PREKVAPENIE"; btn.disabled = true; }
        }

        function openFlightModal() { updateCountdown(); document.getElementById("flight-modal").style.display = "flex"; }
        function closeFlightModal() { document.getElementById("flight-modal").style.display = "none"; }
        function closeModal() { document.getElementById("gift-modal").style.display = "none"; }
    </script>
</body>
</html>
